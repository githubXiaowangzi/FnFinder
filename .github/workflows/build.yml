name: Build for Linux (glibc 2.31 compatible)

# Manual trigger only.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    # 用 Ubuntu 20.04 容器编译，glibc 版本低，兼容性更好
    container: ubuntu:20.04

    steps:
      - name: Install deps (container)
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git ca-certificates cmake ninja-build g++

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Check glibc version used
        run: |
          ldd --version | head -1
          echo "---"
          ldd build/FnFinder

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: FnFinder-linux
          path: build/FnFinder
          if-no-files-found: error
