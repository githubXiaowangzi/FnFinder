name: Build for Linux (fully static)

# Manual trigger only.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    container: ubuntu:20.04

    steps:
      - name: Install deps (container)
        env:
          DEBIAN_FRONTEND: noninteractive
          TZ: Asia/Shanghai
        run: |
          apt-get update
          apt-get install -y --no-install-recommends tzdata git ca-certificates cmake ninja-build g++ libc6-dev

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_EXE_LINKER_FLAGS="-static -static-libgcc -static-libstdc++"

      - name: Build
        run: cmake --build build --parallel

      - name: Verify binary
        run: |
          file build/FnFinder
          echo "---"
          # Static binary should show "statically linked"
          ldd build/FnFinder 2>&1 | head -3

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: FnFinder-linux
          path: build/FnFinder
          if-no-files-found: error
